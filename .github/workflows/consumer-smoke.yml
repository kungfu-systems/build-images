name: Consumer Smoke

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: build-images-consumer-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Pull published images by digest
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify image lock
        run: python3 scripts/verify-image-lock.py

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and smoke published images
        run: bash scripts/smoke-published-images.sh
