name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "dev/**"
      - "dev/v*/v*"
      - "alpha/v*/v*"
      - "release/**"
      - "release/v*/v*"
      - "publish-gate/major"
      - "major-gate"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-images-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          corepack enable pnpm
          pnpm --version

      - name: Validate Buildchain config
        uses: kungfu-systems/buildchain/actions/validate-config@v2.0.14-alpha.0
        with:
          require-version-state: "true"
          require-lifecycle-stages: "verify"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Buildchain verify lifecycle
        run: pnpm run check
