name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "dev/**"
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-images-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify manifests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify image manifests
        run: python3 scripts/verify-image-manifests.py
