name: Publish Images

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-alpha.*"
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Exact image tag to build, for example v1.0.0-alpha.0"
        required: true
        type: string
      publish:
        description: "Push images to GHCR. Manual publishes are rejected; tag pushes publish."
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build image family
    runs-on: ubuntu-24.04
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image-tag || github.ref_name }}
      SHOULD_PUBLISH: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Reject manual publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true }}
        run: |
          echo "::error::Manual image publishing is disabled."
          echo "::error::Buildchain must create the exact release tag; tag push then publishes images."
          exit 1

      - name: Validate image manifests
        run: python3 scripts/verify-image-manifests.py

      - name: Resolve image DAG
        run: python3 scripts/resolve-image-dag.py --json

      - name: Validate publish tag
        run: |
          set -euo pipefail
          case "$IMAGE_TAG" in
            v*-alpha.*|v*.*.*) ;;
            *)
              echo "Refusing to publish non-release image tag: $IMAGE_TAG" >&2
              exit 1
              ;;
          esac

      - name: Verify Buildchain release source
        if: env.SHOULD_PUBLISH == 'true'
        run: bash scripts/verify-buildchain-release-source.sh --tag "$IMAGE_TAG" --require-channel-match

      - name: Verify dry-build release version state
        if: env.SHOULD_PUBLISH != 'true'
        run: bash scripts/verify-buildchain-release-source.sh --tag "$IMAGE_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.SHOULD_PUBLISH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, test, and optionally publish
        run: |
          set -euo pipefail
          args=(--tag "$IMAGE_TAG" --summary "$RUNNER_TEMP/image-digests.json")
          if [ "$SHOULD_PUBLISH" = "true" ]; then
            args+=(--push)
          fi
          bash scripts/build-image-family.sh "${args[@]}"

      - name: Verify published packages are public
        if: env.SHOULD_PUBLISH == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/verify-ghcr-public.sh --tag "$IMAGE_TAG"

      - name: Upload digest summary
        uses: actions/upload-artifact@v4
        with:
          name: image-digests-${{ env.IMAGE_TAG }}
          path: ${{ runner.temp }}/image-digests.json
          if-no-files-found: error
