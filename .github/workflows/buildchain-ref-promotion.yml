name: Buildchain Ref Promotion

on:
  workflow_run:
    workflows: ["Verify"]
    branches:
      - "alpha/v*/v*"
      - "release/v*/v*"
      - "publish-gate/major"
      - "major-gate"
    types: [completed]
  workflow_dispatch:
    inputs:
      sha:
        description: "Verified alpha/release commit to promote. Defaults to the current workflow ref SHA."
        required: false
        default: ""
      target-ref:
        description: "Buildchain channel branch to promote"
        required: true
        default: "alpha/v1/v1.1"
      dry-run:
        description: "Only print planned tag updates"
        required: true
        default: "true"

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: build-images-buildchain-promotion-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success'
      }}
    runs-on: ubuntu-24.04
    steps:
      - name: Reject manual apply
        if: ${{ github.event_name == 'workflow_dispatch' && inputs['dry-run'] != 'true' }}
        run: |
          echo "::error::Manual Buildchain ref promotion is limited to dry-run."
          echo "::error::Merge through alpha/release and let a successful Verify workflow_run promote refs."
          exit 1

      - name: Resolve target SHA
        id: target
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_SHA: ${{ inputs.sha }}
          FALLBACK_SHA: ${{ github.sha }}
        run: |
          sha="${WORKFLOW_RUN_SHA:-${INPUT_SHA:-$FALLBACK_SHA}}"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Resolve target ref
        id: target_ref
        env:
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          INPUT_TARGET_REF: ${{ inputs['target-ref'] }}
        run: |
          target_ref="${WORKFLOW_RUN_BRANCH:-$INPUT_TARGET_REF}"
          case "$target_ref" in
            alpha/v*/v*|release/v*/v*|publish-gate/major|major-gate) ;;
            *)
              echo "::error::unsupported target ref: $target_ref"
              exit 1
              ;;
          esac
          echo "target_ref=${target_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout target commit
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.target.outputs.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          corepack enable pnpm
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        if: ${{ github.event_name != 'workflow_dispatch' || inputs['dry-run'] != 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name != 'workflow_dispatch' || inputs['dry-run'] != 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote Buildchain refs
        uses: kungfu-systems/buildchain/actions/promote-buildchain-ref@v2.0.13-alpha.13
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          token: ${{ secrets.BUILDCHAIN_PROMOTION_TOKEN || github.token }}
          sha: ${{ steps.target.outputs.sha }}
          target-ref: ${{ steps.target_ref.outputs.target_ref }}
          dry-run: ${{ inputs['dry-run'] || 'false' }}
          require-governance: "true"
          require-version-state: "true"
          required-status-check: "check"
          allow-repository: "kungfu-systems/build-images"
          publish-transaction: "true"
