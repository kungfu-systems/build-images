schema = 1
name = "kungfu-verify"
contract_major = 1
platform = "linux-x64"
publish = true

[base]
image = "base-linux"

[runner]
profile = "github-hosted-ubuntu-24.04"
self_hosted_required = false

[build]
context = "."
dockerfile = "Dockerfile"
test_commands = [
  "git --version",
  "fnm --version",
  "uv --version",
  "python3 --version",
  "jq --version",
]
