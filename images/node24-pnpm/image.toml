schema = 1
name = "node24-pnpm"
contract_major = 1
platform = "linux-x64"
publish = true

[base]
image = "base-linux"

[runner]
profile = "github-hosted-ubuntu-24.04"
self_hosted_required = false

[build]
context = "."
dockerfile = "Dockerfile"
test_commands = [
  "node --version",
  "corepack --version",
  "test \"$(pnpm --version)\" = \"11.7.0\"",
]
